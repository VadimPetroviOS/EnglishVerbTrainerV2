  .header-row {

    align-items: center;
    justify-content: center;

  }

  .back-btn {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--blue-label);
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--blue-dark);
  }

  .counter {
    font-size: 14px;
    color: var(--blue-label);
  }

  .player {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    width: 100%;
  }

  .video-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
  }

    width: 100%;
    max-width: 480px;
    border-radius: var(--radius-card);
    background: #000;
    display: block;
  }

  .fullscreen-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    width: 36px;
    height: 36px;
    border: none;
    border-radius: 50%;
    background: rgba(0, 0, 0, 0.45);
    color: #fff;
    font-size: 18px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;

    z-index: 2;

    display: flex;
    flex-direction: column;
    align-items: center;

    width: 100%;

    min-height: 52px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    opacity: 0;
    transition: opacity 0.3s ease;

  .answer-en {
    font-size: 16px;
    font-weight: 500;
    color: var(--blue-dark);
    line-height: 1.4;
  }

  .answer-ru {
    font-size: 14px;
    font-style: italic;
    color: var(--blue-label);
    line-height: 1.4;

  .btn-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 480px;
    justify-content: center;
  }

  .action-btn {
    flex: 1;
    border-radius: var(--radius-btn);
    padding: 13px 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;

    background: #fff;
    border: 1.5px solid var(--blue-border);
    color: var(--blue-label);

    background: #fff;
    border: 1.5px solid var(--blue-border);
    color: var(--blue-label);

    color: var(--blue-dark);

  .btn-next:disabled { opacity: 0.4; cursor: default; }
  .toggle-label { display: flex; align-items: center; cursor: pointer; }
  .toggle-label input { display: none; }
  .toggle-track {
    width: 32px; height: 18px;
    background: var(--blue-border);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: left 0.2s;
  }
  .toggle-label input:checked + .toggle-track { background: var(--blue-dark); }
  .toggle-label input:checked + .toggle-track::after { left: 17px; }
  .action-btn:active { transform: scale(0.97); }

  .player:fullscreen, .player.fake-fullscreen {
    position: fixed;
    inset: 0;
    z-index: 9999;
    width: 100vw;
    height: 100vh;
    height: 100dvh;
    max-width: none;
    justify-content: center;
    background: #000;

    inset: 0;
    width: 100%;
    height: 100%;
    max-width: none;
  }

    inset: 0;
    width: 100%;
    height: 100%;
    max-width: none;
    object-fit: contain;
    border-radius: 0;

    color: #fff;

    right: calc(20px + env(safe-area-inset-right));
  }

  .player:fullscreen .overlay-panel, .player.fake-fullscreen .overlay-panel {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    width: 100%;
    max-width: none;

</div>

let idx = 0;
let checkInterval = null;

const video = document.getElementById('video');

function playClip(start, end) {
  if (checkInterval) clearInterval(checkInterval);
  video.currentTime = start;
  video.play();
  checkInterval = setInterval(() => {
    if (video.currentTime >= end) {
      video.pause();
      clearInterval(checkInterval);
      checkInterval = null;
    }
  }, 50);
}

function loadPhrase() {
  document.getElementById('counter').textContent = `${idx + 1} / ${phrases.length}`;
  document.getElementById('answer-block').classList.remove('visible');
  document.getElementById('answer-display').textContent = '';
  document.getElementById('translation-display').textContent = '';
}

function stopCheck() {
  if (checkInterval) { clearInterval(checkInterval); checkInterval = null; }
}

function playUntil(end) {
  stopCheck();
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.disabled = true;
  video.play();
  checkInterval = setInterval(() => {
    if (video.currentTime >= end) {
      video.pause();
      stopCheck();
      if (nextBtn) nextBtn.disabled = false;
    }
  }, 50);
}

function replay() {
  const p = phrases[idx];
  stopCheck();
  document.getElementById('loading-msg').style.display = 'none';
  video.currentTime = p.start;
  playUntil(p.end);
}

function showAnswer() {
  const p = phrases[idx];
  document.getElementById('answer-display').textContent = p.text;
  const showRu = document.getElementById('ru-toggle').checked;
  document.getElementById('translation-display').textContent = (showRu && p.translation_ru) ? p.translation_ru : '';
  document.getElementById('answer-block').classList.add('visible');
}

function next() {
  idx = (idx + 1) % phrases.length;
  loadPhrase();
  playUntil(phrases[idx].end);
}

function startListening() {
  document.getElementById('start-row').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('counter').style.opacity = '1';
  loadPhrase();
  video.currentTime = 0;
  playUntil(phrases[idx].end);

  const msg = document.getElementById('loading-msg');
  document.getElementById('answer-block').classList.add('visible');
  msg.textContent = 'Подождите, видео загружается...';
  msg.style.display = '';
  setTimeout(() => { msg.style.display = 'none'; }, 10000);
}

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function toggleFullscreen() {
  const player = document.getElementById('player');
  // iOS Safari doesn't reliably support the Fullscreen API on non-video
  // elements (and disables it entirely for installed/PWA home-screen apps),
  // so fall back to a CSS-only fullscreen overlay there.
  if (isIOS() || !document.fullscreenEnabled) {
    player.classList.toggle('fake-fullscreen');
    document.body.classList.toggle('fake-fullscreen-lock');
  } else if (!document.fullscreenElement) {
    player.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
