    flex-direction: column;

    right: 10px;

  .answer-ru {

    font-style: italic;
    color: var(--blue-label);

    gap: 10px;
    width: 100%;
    max-width: 480px;
    justify-content: center;

    font-size: 14px;

  .toggle-label input { display: none; }
  .toggle-track {
    width: 32px; height: 18px;
    background: var(--blue-border);
    border-radius: 9px;
    position: relative;
    transition: background 0.2s;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    width: 12px; height: 12px;
    background: #fff;
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: left 0.2s;
  }

  .toggle-label input:checked + .toggle-track::after { left: 17px; }

  .player:fullscreen, .player.fake-fullscreen {

    z-index: 9999;

    height: 100vh;
    height: 100dvh;
    max-width: none;
    justify-content: center;

    height: 100%;

    height: 100%;

let idx = 0;
let checkInterval = null;

const video = document.getElementById('video');

function playClip(start, end) {
  if (checkInterval) clearInterval(checkInterval);
  video.currentTime = start;
  video.play();
  checkInterval = setInterval(() => {
    if (video.currentTime >= end) {
      video.pause();
      clearInterval(checkInterval);
      checkInterval = null;
    }
  }, 50);
}

function loadPhrase() {
  document.getElementById('counter').textContent = `${idx + 1} / ${phrases.length}`;
  document.getElementById('answer-block').classList.remove('visible');
  document.getElementById('answer-display').textContent = '';
  document.getElementById('translation-display').textContent = '';
}

function stopCheck() {
  if (checkInterval) { clearInterval(checkInterval); checkInterval = null; }
}

function playUntil(end) {
  stopCheck();
  const nextBtn = document.getElementById('next-btn');
  if (nextBtn) nextBtn.disabled = true;
  video.play();
  checkInterval = setInterval(() => {
    if (video.currentTime >= end) {
      video.pause();
      stopCheck();
      if (nextBtn) nextBtn.disabled = false;
    }
  }, 50);
}

function replay() {
  const p = phrases[idx];
  stopCheck();
  document.getElementById('loading-msg').style.display = 'none';
  video.currentTime = p.start;
  playUntil(p.end);
}

function showAnswer() {
  const p = phrases[idx];
  document.getElementById('answer-display').textContent = p.text;
  const showRu = document.getElementById('ru-toggle').checked;
  document.getElementById('translation-display').textContent = (showRu && p.translation_ru) ? p.translation_ru : '';
  document.getElementById('answer-block').classList.add('visible');
}

function next() {
  idx = (idx + 1) % phrases.length;
  loadPhrase();
  playUntil(phrases[idx].end);
}

function startListening() {
  document.getElementById('start-row').style.display = 'none';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('counter').style.opacity = '1';
  loadPhrase();
  video.currentTime = 0;
  playUntil(phrases[idx].end);

  const msg = document.getElementById('loading-msg');
  document.getElementById('answer-block').classList.add('visible');
  msg.textContent = 'Подождите, видео загружается...';
  msg.style.display = '';
  setTimeout(() => { msg.style.display = 'none'; }, 10000);
}

function isIOS() {
  return /iPad|iPhone|iPod/.test(navigator.userAgent) ||
    (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
}

function toggleFullscreen() {
  const player = document.getElementById('player');
  // iOS Safari doesn't reliably support the Fullscreen API on non-video
  // elements (and disables it entirely for installed/PWA home-screen apps),
  // so fall back to a CSS-only fullscreen overlay there.
  if (isIOS() || !document.fullscreenEnabled) {
    player.classList.toggle('fake-fullscreen');
    document.body.classList.toggle('fake-fullscreen-lock');
  } else if (!document.fullscreenElement) {
    player.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}
