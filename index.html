<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="manifest" href="manifest.json" />
<meta name="theme-color" content="#1a4d70" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>English Verb Trainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-light: #daeeff;
    --blue-hover: #c4e4f8;
    --blue-dark: #1a4d70;
    --blue-label: #3a7aaa;
    --blue-border: #7bbfe8;
    --bg: #f0f8ff;
    --radius-card: 20px;
    --radius-btn: 50px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.25rem 3rem;
    color: var(--blue-dark);
  }

  header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--blue-dark);
    letter-spacing: -0.01em;
  }

  .mode-row {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    max-width: 280px;
  }

  .mode-btn {
    width: 100%;
    height: auto;
    padding: 18px 24px;
    border-radius: var(--radius-btn);
    border: 1.5px solid var(--blue-border);
    background: var(--blue-light);
    color: var(--blue-dark);
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }

  .mode-btn:hover { background: var(--blue-hover); }
  .mode-btn:active { transform: scale(0.97); }
</style>
</head>
<body>

<header>
  <h1>English Verb Trainer</h1>
</header>

<div class="mode-row">
  <button class="mode-btn" onclick="location.href='verbs.html'">Глаголы</button>
  <button class="mode-btn" onclick="location.href='questions.html'">Вопросы</button>
  <button class="mode-btn" onclick="location.href='phrases.html'">Фразы</button>
  <button class="mode-btn" onclick="location.href='prepositions.html'">Предлоги</button>
  <button class="mode-btn" onclick="location.href='vocab.html'">Словарный запас</button>
  <button class="mode-btn" onclick="location.href='listening.html'">Аудирование</button>
  <button class="mode-btn" onclick="location.href='speaking.html'">Говорение</button>
</div>

<script>
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
}
</script>
</body>
</html>
