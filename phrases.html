<title>Фразы — Verb Trainer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-light: #daeeff;
    --blue-hover: #c4e4f8;
    --blue-dark: #1a4d70;
    --blue-label: #3a7aaa;
    --blue-border: #7bbfe8;
    --bg: #f0f8ff;
    --radius-card: 20px;
    --radius-btn: 50px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2.5rem 1.25rem 3rem;
    color: var(--blue-dark);
    gap: 1.5rem;
  }

  header { text-align: center; margin-bottom: 0; }

  .header-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .back-btn {
    background: none;
    border: none;
    font-size: 20px;
    color: var(--blue-label);
    cursor: pointer;
    padding: 0 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--blue-dark); }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--blue-dark);
    letter-spacing: -0.01em;
  }

  .stats-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 1.25rem;
    margin-bottom: 1.25rem;
    font-size: 14px;
    color: var(--blue-label);
  }
  .stat-sep { opacity: 0.4; }
  #timer-display {
    font-weight: 600;
    color: var(--blue-dark);
    font-variant-numeric: tabular-nums;
  }
  #timer-display.urgent { color: #c0392b; }

  .phrase-container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 8px;
  }

  .phrase-label {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--blue-label);
  }

  .phrase-ru {
    font-size: 18px;
    font-weight: 500;
    color: var(--blue-dark);
    line-height: 1.4;
    transition: opacity 0.12s ease, transform 0.12s ease;
  }

  .phrase-ru.animating {
    opacity: 0;
    transform: translateY(8px);
  }

  .phrase-container.hidden .phrase-label,
  .phrase-container.hidden .phrase-ru {
    opacity: 0;
  }

  .answer-display {
    height: 30px;
    margin: 0;
    font-size: 18px;
    font-weight: 500;
    color: var(--blue-dark);
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 480px;
  }
  .answer-display.visible { opacity: 1; }

  .btn-row {
    display: flex;
    gap: 12px;
    width: 100%;
    max-width: 480px;
    justify-content: center;
  }

  .action-btn {
    flex: 1;
    max-width: 220px;
    border-radius: var(--radius-btn);
    padding: 14px 24px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
  }
  .answer-btn {
    background: #fff;
    border: 1.5px solid var(--blue-border);
    color: var(--blue-label);
  }
  .answer-btn:hover { background: var(--blue-light); }
  .refresh-btn {
    background: var(--blue-light);
    border: 1.5px solid var(--blue-border);
    color: var(--blue-dark);
  }
  .refresh-btn:hover { background: var(--blue-hover); }
  .action-btn:active { transform: scale(0.97); }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    padding: 2rem;
    width: 90%;
    max-width: 400px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    position: relative;
    text-align: center;
  }
</style>
</head>

<header>
  <div class="header-row">

let current = null;
let score = 0;
let timerInterval = null;
let secondsLeft = 600;
let timerStarted = false;

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function startTimer() {
  if (timerStarted) return;
  timerStarted = true;
  timerInterval = setInterval(() => {
    secondsLeft--;
    const m = Math.floor(secondsLeft / 60);
    const s = secondsLeft % 60;
    const el = document.getElementById('timer-display');
    el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
    if (secondsLeft <= 60) el.classList.add('urgent');
    if (secondsLeft <= 0) { clearInterval(timerInterval); showResult(); }
  }, 1000);
}

function showResult() {
  document.getElementById('result-score').textContent = `Счёт: ${score} из 150`;
  if (score >= 150) {
    document.getElementById('result-emoji').textContent = '🏆';
    document.getElementById('result-title').textContent = 'Поздравляем, ты достиг автоматизма!';
  } else {
    document.getElementById('result-emoji').textContent = '💪';
    document.getElementById('result-title').textContent = 'Ты хорошо поработал, давай еще!';
  }
  document.getElementById('result-modal').classList.add('open');
}

function restartGame() {
  document.getElementById('result-modal').classList.remove('open');
  score = 0; secondsLeft = 600; timerStarted = false; current = null;
  document.getElementById('score-display').textContent = '0';
  document.getElementById('timer-display').textContent = '10:00';
  document.getElementById('timer-display').classList.remove('urgent');
  document.getElementById('next-btn').textContent = 'Начать';
  document.getElementById('phrase-container').classList.add('hidden');
  document.getElementById('phrase-ru').textContent = '\u00a0';
  const ans = document.getElementById('answer-display');
  ans.classList.remove('visible'); ans.textContent = '';
}

function showAnswer() {
  if (!current) return;
  const el = document.getElementById('answer-display');
  el.textContent = current.en;
  el.classList.add('visible');
}

function refresh() {
  if (current) {
    score++;
    document.getElementById('score-display').textContent = score;
  }
  startTimer();
  current = pick(phrases);
  document.getElementById('next-btn').textContent = 'Следующее';
  document.getElementById('phrase-container').classList.remove('hidden');
  const ans = document.getElementById('answer-display');
  ans.classList.remove('visible'); ans.textContent = '';
  const ru = document.getElementById('phrase-ru');
  ru.classList.add('animating');
  setTimeout(() => {
    ru.textContent = current.ru;
    ru.classList.remove('animating');
  }, 130);
}
