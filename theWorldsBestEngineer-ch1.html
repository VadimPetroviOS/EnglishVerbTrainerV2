<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue-light: #daeeff;
    --blue-hover: #c4e4f8;
    --blue-dark: #1a4d70;
    --blue-label: #3a7aaa;
    --blue-border: #7bbfe8;
    --bg: #f0f8ff;
    --radius-card: 20px;
    --radius-btn: 50px;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2.5rem 1.75rem 6.5rem;
    color: var(--blue-dark);
  }

  header { text-align: center; margin-bottom: 1.25rem; }

  header h1 {
    font-size: 20px;
    font-weight: 600;
    color: var(--blue-dark);
    letter-spacing: -0.01em;
  }

  .page-wrap {
    position: relative;
    width: 100%;
    max-width: 480px;
  }
  .page-wrap + .page-wrap {
    margin-top: 0;
  }

  .toggle-all-btn {
    position: fixed;
    left: 50%;
    bottom: 18px;
    transform: translateX(-50%);
    width: calc(100% - 2.4rem);
    max-width: 480px;
    border-radius: var(--radius-btn);
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    box-shadow: 0 4px 18px rgba(26,77,112,0.3);
    background: var(--blue-light);
    border: 1.5px solid var(--blue-border);
    color: var(--blue-dark);
    z-index: 30;
  }
  .toggle-all-btn:hover { background: var(--blue-hover); }
  .toggle-all-btn:active { transform: translateX(-50%) scale(0.98); }
  .toggle-all-btn.active {
    background: var(--blue-dark);
    color: #fff;
    border-color: var(--blue-dark);
  }
  .next-btn {
    display: block;
    width: 100%;
    margin-top: 1.25rem;
    border-radius: var(--radius-btn);
    padding: 16px 20px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    font-family: inherit;
    box-shadow: 0 4px 18px rgba(26,77,112,0.3);
    background: var(--blue-dark);
    border: 1.5px solid var(--blue-dark);
    color: #fff;
  }
  .next-btn:hover { background: #123a56; }
  .next-btn:active { transform: scale(0.98); }
  .page-frame {
    border: 1.5px solid var(--blue-border);
    border-radius: var(--radius-card);
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(26,77,112,0.1);
  }
  .page-wrap:first-of-type .page-frame {
    border-radius: var(--radius-card) var(--radius-card) 0 0;
    border-bottom: none;
  }
  .page-wrap:last-of-type .page-frame {
    border-radius: 0 0 var(--radius-card) var(--radius-card);
  }
  .page-wrap:not(:first-of-type):not(:last-of-type) .page-frame {
    border-radius: 0;
    border-top: none;
    border-bottom: none;
  }
  .page-frame img {
    display: block;
    width: 100%;
    height: auto;
  }

  .pin {
    position: absolute;
    left: -15px;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #fff;
    border: 1.5px solid var(--blue-border);
    color: var(--blue-label);
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(26,77,112,0.3);
    transform: translateY(-50%);
    transition: background 0.15s, color 0.15s, transform 0.15s;
    z-index: 5;
    touch-action: none;
    cursor: grab;
  }
  .pin:hover { transform: translateY(-50%) scale(1.08); }
  .pin.open {
    background: var(--blue-dark);
    color: #fff;
    border-color: var(--blue-dark);
  }
  .pin.dragging {
    cursor: grabbing;
    box-shadow: 0 0 0 4px rgba(26,77,112,0.2), 0 2px 8px rgba(26,77,112,0.3);
    transition: none;
  }

  .trans-popup {
    position: absolute;
    left: 24px;
    max-width: 76%;
    background: rgba(255,255,255,0.97);
    border: 1.5px solid var(--blue-border);
    border-radius: 14px;
    padding: 9px 14px;
    font-size: 13px;
    font-style: italic;
    line-height: 1.4;
    color: var(--blue-label);
    box-shadow: 0 4px 16px rgba(26,77,112,0.22);
    transform: translateY(-50%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 6;
  }
  .trans-popup.visible {
    opacity: 1;
    pointer-events: auto;
  }

  @media (max-width: 420px) {
    body { padding-left: 1.1rem; padding-right: 1.1rem; }
    .pin { width: 26px; height: 26px; left: -13px; font-size: 12px; }
    .trans-popup { font-size: 12px; max-width: 80%; }
  }
</style>

function renderPage(wrapId, pageData, storageKey) {
  (function restoreFromStorage() {
    try {
      const saved = JSON.parse(localStorage.getItem(storageKey) || 'null');
      if (Array.isArray(saved) && saved.length === pageData.length) {
        saved.forEach((y, i) => { if (typeof y === 'number') pageData[i].y = y; });
      }
    } catch (e) {}
  })();

  function persist() {
    localStorage.setItem(storageKey, JSON.stringify(pageData.map(item => item.y)));
  }

  const wrap = document.getElementById(wrapId);

  function makeDraggable(pin, popup, item) {
    let dragging = false, startY = 0, moved = false;

    pin.addEventListener('pointerdown', (e) => {
      dragging = true;
      moved = false;
      startY = e.clientY;
      pin.classList.add('dragging');
      pin.setPointerCapture(e.pointerId);
    });

    pin.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      if (Math.abs(e.clientY - startY) > 4) moved = true;
      if (!moved) return;
      const rect = wrap.getBoundingClientRect();
      let pct = ((e.clientY - rect.top) / rect.height) * 100;
      pct = Math.max(0.2, Math.min(99.8, pct));
      pct = Math.round(pct * 100) / 100;
      item.y = pct;
      pin.style.top = pct + '%';
      popup.style.top = pct + '%';
    });

    function endDrag() {
      if (!dragging) return;
      dragging = false;
      pin.classList.remove('dragging');
      if (moved) {
        pin._justDragged = true;
        persist();
      }
    }
    pin.addEventListener('pointerup', endDrag);
    pin.addEventListener('pointercancel', endDrag);
  }

  pageData.forEach((item) => {
    const pin = document.createElement('button');
    pin.className = 'pin';
    pin.style.top = item.y + '%';
    pin.setAttribute('aria-label', 'Показать перевод');
    pin.textContent = '🌐';

    const popup = document.createElement('div');
    popup.className = 'trans-popup';
    popup.style.top = item.y + '%';
    popup.textContent = item.ru;

    makeDraggable(pin, popup, item);

    pin.addEventListener('click', () => {
      if (pin._justDragged) { pin._justDragged = false; return; }
      const open = popup.classList.toggle('visible');
      pin.classList.toggle('open', open);
    });

    wrap.appendChild(pin);
    wrap.appendChild(popup);
  });
}

let allShown = false;

function toggleAll() {
  allShown = !allShown;
  document.querySelectorAll('.trans-popup').forEach(el => el.classList.toggle('visible', allShown));
  document.querySelectorAll('.pin').forEach(el => el.classList.toggle('open', allShown));
  const btn = document.getElementById('toggle-all-btn');
  btn.textContent = allShown ? 'Скрыть перевод' : 'Показать перевод';
  btn.classList.toggle('active', allShown);
}
